# ─────────────────────────────────────────────────────────────────────────────
# Communications Service — Standalone Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Brings up the communications-service with ALL its dependencies:
#   PostgreSQL, Redis, RabbitMQ, Matrix Synapse, Janus Gateway, coturn
#
# Usage:
#   cp .env.example .env    # (or use the provided .env)
#   docker compose up -d
#
# This is designed for deploying the service independently of the parliament
# monorepo. When running inside the monorepo, use the root docker-compose
# instead and connect to shared infrastructure.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Application ─────────────────────────────────────────────────────────
  communications-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comms-service
    restart: unless-stopped
    ports:
      - "${COMMS_SERVICE_PORT:-3014}:3014"
    env_file: .env
    environment:
      # Internal service-to-service URLs (Docker network hostnames)
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/vps-comms-db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      MATRIX_SERVER_URL: http://synapse:8020
      JANUS_HTTP_URL: http://janus-gateway:8088/janus
      JANUS_WS_URL: ws://janus-gateway:8188
      # Public URLs returned to clients — override via .env with your host IP or domain
      MATRIX_PUBLIC_SERVER_URL: ${MATRIX_PUBLIC_SERVER_URL:-http://localhost:8020}
      JANUS_PUBLIC_WS_URL: ${JANUS_PUBLIC_WS_URL:-ws://localhost:8188}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      synapse:
        condition: service_started
      janus-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3014/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - comms-network

  # ── Infrastructure ──────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: comms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: vps-comms-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vps-comms-db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comms-network

  redis:
    image: redis:7-alpine
    container_name: comms-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - comms-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: comms-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - comms-network

  # ── Matrix Synapse (Chat) ───────────────────────────────────────────────

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: comms-synapse
    restart: unless-stopped
    entrypoint: /conf/entrypoint.sh
    volumes:
      - ./infra/synapse/homeserver.yaml:/conf/homeserver.yaml
      - ./infra/synapse/synapse.log.config:/conf/synapse.log.config:ro
      - ./infra/synapse/entrypoint.sh:/conf/entrypoint.sh:ro
      - synapse_data:/data
    environment:
      MATRIX_SERVER_NAME: ${MATRIX_SERVER_NAME:-comms.local}
      MATRIX_REGISTRATION_SHARED_SECRET: ${MATRIX_REGISTRATION_SHARED_SECRET:-change-me-registration-secret}
    ports:
      - "8020:8020"
    networks:
      - comms-network

  # ── Janus Gateway (Audio/Video) ─────────────────────────────────────────

  janus-gateway:
    image: canyan/janus-gateway:latest
    container_name: comms-janus
    restart: unless-stopped
    entrypoint: /entrypoint.sh
    volumes:
      - ./infra/janus/janus.jcfg:/usr/local/etc/janus/janus.jcfg
      - ./infra/janus/janus.transport.websockets.jcfg:/usr/local/etc/janus/janus.transport.websockets.jcfg
      - ./infra/janus/janus.transport.http.jcfg:/usr/local/etc/janus/janus.transport.http.jcfg
      - ./infra/janus/entrypoint.sh:/entrypoint.sh:ro
    environment:
      JANUS_STUN_SERVER: ${JANUS_STUN_SERVER:-stun.l.google.com}
      JANUS_STUN_PORT: ${JANUS_STUN_PORT:-19302}
      JANUS_NAT_1_1: ${JANUS_NAT_1_1:-}
      JANUS_TURN_SERVER: ${JANUS_TURN_SERVER:-}
      JANUS_TURN_PORT: ${JANUS_TURN_PORT:-3478}
      JANUS_TURN_USER: ${TURN_USERNAME:-parliament}
      JANUS_TURN_PWD: ${TURN_PASSWORD:-change-me-turn-password}
    ports:
      - "8088:8088"     # HTTP API
      - "8188:8188"     # WebSocket
      - "10000-10200:10000-10200/udp"  # RTP/SRTP media
    networks:
      - comms-network

  # ── coturn (TURN/STUN Relay) ────────────────────────────────────────────

  coturn:
    image: coturn/coturn:latest
    container_name: comms-coturn
    restart: unless-stopped
    entrypoint: /entrypoint.sh
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf
      - ./infra/coturn/entrypoint.sh:/entrypoint.sh:ro
    environment:
      TURN_USERNAME: ${TURN_USERNAME:-parliament}
      TURN_PASSWORD: ${TURN_PASSWORD:-change-me-turn-password}
      TURN_REALM: ${TURN_REALM:-parliament.local}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:-}
      TURN_MIN_PORT: ${TURN_MIN_PORT:-49160}
      TURN_MAX_PORT: ${TURN_MAX_PORT:-49200}
    ports:
      - "3478:3478"           # STUN/TURN
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"  # Relay range
    networks:
      - comms-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  synapse_data:

networks:
  comms-network:
    driver: bridge
