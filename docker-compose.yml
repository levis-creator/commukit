# ─────────────────────────────────────────────────────────────────────────────
# Communications Service — Standalone Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Brings up the communications-service with the dependencies matching your
# deployment shape. Optional containers are gated behind Docker Compose
# profiles so consumers only run what they need:
#
#   profile   container(s)            capability
#   ───────   ───────────────────     ─────────────────────────────────
#   (core)    comms-service,          always on — HTTP API + auth + rooms
#             postgres, redis,
#             rabbitmq
#   chat      synapse                 Matrix Synapse (chat)
#   media     janus-gateway, coturn   WebRTC audio/video via Janus
#   sip       kamailio                Free SIP softphone access (requires media)
#   livekit   livekit                 Alternative WebRTC backend — scaffold
#                                     only, adapter TBD (see docs/PROVIDERS.md)
#
# `media` and `livekit` are mutually-exclusive alternatives for the
# MediaProvider. Pick one via MEDIA_PROVIDER=janus|livekit in .env.
#
# Usage:
#   cp .env.example .env                           # default: chat + media
#   docker compose up -d                           # follows COMPOSE_PROFILES in .env
#
# Explicit profile examples:
#   COMPOSE_PROFILES=chat docker compose up -d              # chat only
#   COMPOSE_PROFILES=media docker compose up -d             # audio/video via Janus
#   COMPOSE_PROFILES=chat,livekit docker compose up -d      # audio/video via LiveKit
#   COMPOSE_PROFILES=chat,media,sip docker compose up -d    # everything (Janus path)
#
# This is designed for deploying the service independently. When running
# inside an existing monorepo, point the env at shared infrastructure and
# skip whichever profiles duplicate services you already run.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Application (always on — no profile) ────────────────────────────────
  communications-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comms-service
    restart: unless-stopped
    ports:
      - '${COMMS_SERVICE_PORT:-3014}:3014'
    env_file: .env
    environment:
      # Internal service-to-service URLs (Docker network hostnames)
      # Dedicated schema isolates commukit tables from co-tenants of the
      # same database (e.g. Kamailio's location/subscriber/version tables
      # that the postgres init script creates in `public`). entrypoint.sh
      # runs `CREATE SCHEMA IF NOT EXISTS commukit` before migrations so
      # the schema exists on first boot.
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/vps-comms-db?schema=commukit
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      MATRIX_SERVER_URL: http://synapse:8020
      JANUS_HTTP_URL: http://janus-gateway:8088/janus
      JANUS_WS_URL: ws://janus-gateway:8188
      SIP_REGISTRAR_HOST: kamailio
      # Public URLs returned to clients — override via .env with your host IP or domain
      MATRIX_PUBLIC_SERVER_URL: ${MATRIX_PUBLIC_SERVER_URL:-http://localhost:8020}
      JANUS_PUBLIC_WS_URL: ${JANUS_PUBLIC_WS_URL:-ws://localhost:8188}
      # Provider selection (Phase 1 abstraction — see src/providers/)
      MEDIA_PROVIDER: ${MEDIA_PROVIDER:-janus}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-matrix}
      # LiveKit media + SIP
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_SIP_HOST: ${LIVEKIT_SIP_HOST:-localhost}
      LIVEKIT_SIP_PORT: ${LIVEKIT_SIP_PORT:-5060}
      LIVEKIT_SIP_TRANSPORT: ${LIVEKIT_SIP_TRANSPORT:-udp}
      LIVEKIT_SIP_USERNAME: ${LIVEKIT_SIP_USERNAME:-comms_sip}
      LIVEKIT_SIP_PASSWORD: ${LIVEKIT_SIP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      # Capability sidecars are `required: false` so comms-service boots
      # regardless of which profiles are active. Unavailability is surfaced
      # via /health and the session response `status` fields.
      synapse:
        condition: service_started
        required: false
      janus-gateway:
        condition: service_started
        required: false
      kamailio:
        condition: service_healthy
        required: false
      livekit:
        condition: service_started
        required: false
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3014/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - comms-network

  # ── Core Infrastructure (always on — no profile) ────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: comms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-vps-comms-db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Kamailio's schema bootstrap. Runs once on first boot via the
      # postgres image's docker-entrypoint-initdb.d hook. Safe even when
      # the `sip` profile isn't active — it only creates tables that
      # Kamailio would otherwise create itself.
      - ./infra/kamailio/init.sql:/docker-entrypoint-initdb.d/10-kamailio.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vps-comms-db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comms-network

  redis:
    image: redis:7-alpine
    container_name: comms-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - comms-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: comms-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - comms-network

  # ── Matrix Synapse (chat profile) ───────────────────────────────────────
  # Only starts when COMPOSE_PROFILES includes `chat`.

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: comms-synapse
    profiles: ['chat']
    restart: unless-stopped
    entrypoint: /conf/entrypoint.sh
    volumes:
      - ./infra/synapse/homeserver.yaml:/conf/homeserver.yaml
      - ./infra/synapse/synapse.log.config:/conf/synapse.log.config:ro
      - ./infra/synapse/entrypoint.sh:/conf/entrypoint.sh:ro
      - synapse_data:/data
    environment:
      MATRIX_SERVER_NAME: ${MATRIX_SERVER_NAME:-comms.local}
      MATRIX_REGISTRATION_SHARED_SECRET: ${MATRIX_REGISTRATION_SHARED_SECRET:-change-me-registration-secret}
    ports:
      - '8020:8020'
    networks:
      - comms-network

  # ── Janus Gateway (media profile) ───────────────────────────────────────
  # Only starts when COMPOSE_PROFILES includes `media`.

  janus-gateway:
    image: canyan/janus-gateway:latest
    container_name: comms-janus
    profiles: ['media']
    restart: unless-stopped
    entrypoint: /entrypoint.sh
    volumes:
      - ./infra/janus/janus.jcfg:/usr/local/etc/janus/janus.jcfg
      - ./infra/janus/janus.transport.websockets.jcfg:/usr/local/etc/janus/janus.transport.websockets.jcfg
      - ./infra/janus/janus.transport.http.jcfg:/usr/local/etc/janus/janus.transport.http.jcfg
      - ./infra/janus/janus.plugin.sip.jcfg:/usr/local/etc/janus/janus.plugin.sip.jcfg
      - ./infra/janus/entrypoint.sh:/entrypoint.sh:ro
    environment:
      JANUS_STUN_SERVER: ${JANUS_STUN_SERVER:-stun.l.google.com}
      JANUS_STUN_PORT: ${JANUS_STUN_PORT:-19302}
      JANUS_NAT_1_1: ${JANUS_NAT_1_1:-}
      JANUS_TURN_SERVER: ${JANUS_TURN_SERVER:-}
      JANUS_TURN_PORT: ${JANUS_TURN_PORT:-3478}
      JANUS_TURN_USER: ${TURN_USERNAME:-comms}
      JANUS_TURN_PWD: ${TURN_PASSWORD:-change-me-turn-password}
    depends_on:
      # When `sip` profile is ALSO active, Janus waits for Kamailio to be
      # healthy so the SIP bridge can REGISTER on first boot. When `sip`
      # isn't active, this dependency is skipped (required: false).
      kamailio:
        condition: service_healthy
        required: false
    ports:
      - '8088:8088' # HTTP API
      - '8188:8188' # WebSocket
      - '10000-10200:10000-10200/udp' # AudioBridge + VideoRoom RTP/SRTP
      - '20000-20999:20000-20999/udp' # SIP plugin RTP (isolated from AudioBridge range)
    networks:
      - comms-network

  # ── coturn (media profile) ──────────────────────────────────────────────
  # TURN/STUN relay for WebRTC clients behind NAT. Shares the media profile
  # with Janus because it only has work to do when Janus is also running.

  coturn:
    image: coturn/coturn:latest
    container_name: comms-coturn
    profiles: ['media']
    restart: unless-stopped
    entrypoint: /entrypoint.sh
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf
      - ./infra/coturn/entrypoint.sh:/entrypoint.sh:ro
    environment:
      TURN_USERNAME: ${TURN_USERNAME:-comms}
      TURN_PASSWORD: ${TURN_PASSWORD:-change-me-turn-password}
      TURN_REALM: ${TURN_REALM:-comms.local}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:-}
      TURN_MIN_PORT: ${TURN_MIN_PORT:-49160}
      TURN_MAX_PORT: ${TURN_MAX_PORT:-49200}
    ports:
      - '3478:3478' # STUN/TURN
      - '3478:3478/udp'
      - '49160-49200:49160-49200/udp' # Relay range
    networks:
      - comms-network

  # ── Kamailio SIP Registrar (sip profile) ────────────────────────────────
  # Free SIP softphone access. Requires the `media` profile too since SIP
  # calls bridge into Janus AudioBridge rooms.
  #
  # NOT A PSTN GATEWAY — this is an internal SIP federation. Users register
  # free softphones, dial room URIs, and join AudioBridge rooms. No real
  # phone numbers, no carrier, no per-minute cost.

  kamailio:
    image: ghcr.io/kamailio/kamailio-ci:5.7.4-alpine
    container_name: comms-kamailio
    profiles: ['sip']
    restart: unless-stopped
    volumes:
      - ./infra/kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - kamailio-tls:/etc/kamailio/tls
    environment:
      DBENGINE: POSTGRES
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      DB_NAME: ${POSTGRES_DB:-vps-comms-db}
      SIP_DOMAIN: ${SIP_DOMAIN:-comms.local}
    ports:
      - '${SIP_HOST_PORT_UDP:-5060}:5060/udp'
      - '${SIP_HOST_PORT_TCP:-5060}:5060/tcp'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'kamcmd core.uptime || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - comms-network

  # ── LiveKit (livekit profile) ──────────────────────────────────────────
  # Alternative media backend. Dormant by default — only starts when
  # COMPOSE_PROFILES includes `livekit`. Pair with `MEDIA_PROVIDER=livekit`
  # in .env.
  #
  # Note: LiveKit does not replace Matrix. Chat remains on the `chat`
  # profile regardless of which media backend is active.

  livekit:
    image: livekit/livekit-server:latest
    container_name: comms-livekit
    profiles: ['livekit']
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: '${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-change-me-livekit-secret}'
    ports:
      - '7880:7880' # HTTP + WebSocket signaling
      - '7881:7881' # TURN/TLS
      - '50000-50100:50000-50100/udp' # RTC media (disjoint from Janus 10000-10200)
    networks:
      - comms-network

  livekit-sip:
    image: livekit/sip:latest
    container_name: comms-livekit-sip
    profiles: ['livekit']
    restart: unless-stopped
    network_mode: host
    command: --config /etc/livekit-sip.yaml
    volumes:
      - ./infra/livekit/livekit-sip.yaml:/etc/livekit-sip.yaml:ro
    environment:
      SIP_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY:-devkey}
        api_secret: ${LIVEKIT_API_SECRET:-change-me-livekit-secret}
        ws_url: ws://127.0.0.1:7880
        redis:
          address: 127.0.0.1:6379
        sip_port: ${LIVEKIT_SIP_PORT:-5060}
        rtp_port: 12000
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  synapse_data:
  kamailio-tls:

networks:
  comms-network:
    driver: bridge
