#!KAMAILIO
#
# ─────────────────────────────────────────────────────────────────────────────
# Kamailio Configuration — Communications Service SIP Registrar
# ─────────────────────────────────────────────────────────────────────────────
# This is a minimal SIP registrar + proxy that:
#
#   1. Accepts REGISTER requests from free SIP softphones (Linphone, Zoiper,
#      MicroSIP, Jitsi, Bria) and authenticates them via DIGEST against the
#      shared PostgreSQL `subscriber` table (written by comms-service).
#
#   2. Routes INVITEs whose To-URI matches `sip:room-*@<domain>` to the
#      Janus SIP plugin (also registered as a bridge user in this registrar).
#      A custom `X-Comms-Context-Id` header carries the room id for the Janus
#      side of comms-service to look up.
#
#   3. Rejects ALL other INVITEs with 404. No PSTN, no federation, no
#      relay — this is a strictly private internal SIP registrar.
#
# IMPORTANT: keep this config intentionally small. If you need PBX features
# (IVR, hold music, call transfer, recording), run Asterisk or FreeSWITCH
# as a second sidecar instead of bloating this file.
#
# Environment variables consumed (from docker-compose):
#   DB_HOST       — PostgreSQL host (usually `postgres`)
#   DB_PORT       — PostgreSQL port (5432)
#   DB_USER       — PostgreSQL username
#   DB_PASSWORD   — PostgreSQL password
#   DB_NAME       — PostgreSQL database name
#   SIP_DOMAIN    — the SIP domain advertised to softphones (e.g. comms.local)
# ─────────────────────────────────────────────────────────────────────────────

####### Global Parameters #########

debug=2
log_stderror=yes
memdbg=5
memlog=5
log_facility=LOG_LOCAL0

fork=yes
children=4

# Listen on all interfaces inside the container on standard SIP ports
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

disable_tcp=no
auto_aliases=no

####### Modules Section ########

loadmodule "db_postgres.so"
loadmodule "pv.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "permissions.so"
loadmodule "pike.so"
loadmodule "textopsx.so"

# ----- db_postgres -----
modparam("db_postgres", "con_param", "connect_timeout=5")

# ----- usrloc -----
modparam("usrloc", "db_mode",   2)
modparam("usrloc", "db_url",    "postgres://DBU:DBP@DBH:DBT/DBN")

# ----- registrar -----
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_contacts", 3)

# ----- auth_db -----
modparam("auth_db", "db_url",      "postgres://DBU:DBP@DBH:DBT/DBN")
modparam("auth_db", "calculate_ha1", 0)
modparam("auth_db", "password_column", "password")
modparam("auth_db", "user_column",     "username")
modparam("auth_db", "domain_column",   "domain")
modparam("auth_db", "load_credentials", "")
modparam("auth_db", "use_domain", 1)

# ----- pike (rate limiting) -----
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 20)
modparam("pike", "remove_latency", 4)

# ----- tm -----
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# ----- rr -----
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)

####### Routing Logic ########

request_route {
	# Rate limit by source IP
	if (!pike_check_req()) {
		xlog("L_ALERT","ALERT: pike blocking $si\n");
		sl_send_reply("503", "Too Many Requests");
		exit;
	}

	# Sanity checks
	if (!mf_process_maxfwd_header("10")) {
		sl_send_reply("483", "Too Many Hops");
		exit;
	}

	if (!sanity_check("17895", "7")) {
		xlog("Malformed SIP request: $ou\n");
		exit;
	}

	# REGISTER handling
	if (is_method("REGISTER")) {
		# Authenticate REGISTER via DIGEST against the subscriber table
		if (!auth_check("$fd", "subscriber", "1")) {
			auth_challenge("$fd", "0");
			exit;
		}
		# Remove PII from the credentials header
		consume_credentials();

		if (!save("location")) {
			sl_reply_error();
		}
		exit;
	}

	# INVITE handling — only accept calls to `room-*@<domain>`
	if (is_method("INVITE")) {
		# Authenticate the caller
		if (!auth_check("$fd", "subscriber", "1")) {
			auth_challenge("$fd", "0");
			exit;
		}
		consume_credentials();

		# Extract the user portion of the To-URI
		if ($tU =~ "^room-[a-zA-Z0-9-]+$") {
			# Pull the contextId out of the room URI (everything after "room-")
			$var(contextId) = $(tU{s.substr,5,0});
			append_hf("X-Comms-Context-Id: $var(contextId)\r\n");

			# Route to the Janus SIP bridge (registered as janus@<domain>)
			# Location lookup will substitute the real Janus contact.
			$ru = "sip:janus@" + $fd;
			if (!lookup("location")) {
				xlog("L_WARN","Janus SIP bridge not registered; rejecting room call to $tU\n");
				sl_send_reply("503", "Service Unavailable");
				exit;
			}
			t_relay();
			exit;
		}

		# Anything else is not allowed — no PSTN, no federation
		sl_send_reply("404", "Not Found");
		exit;
	}

	# BYE / CANCEL / ACK for established dialogs
	if (has_totag()) {
		if (loose_route()) {
			t_relay();
			exit;
		}
	}

	# Catch-all: reject unknown requests
	sl_send_reply("405", "Method Not Allowed");
	exit;
}
