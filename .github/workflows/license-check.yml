name: License check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  allowed-licenses:
    name: Verify dependency licenses are compatible with Apache-2.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
      - run: npm ci

      # Auto-fail on any copyleft / SSPL / BUSL license in the production
      # dependency tree. These are incompatible with distributing commukit
      # as an Apache-2.0 bundle.
      - name: Fail on forbidden licenses
        run: |
          npx --yes license-checker-rseidelsohn \
            --production \
            --failOn 'GPL-1.0;GPL-2.0;GPL-2.0-only;GPL-2.0-or-later;GPL-3.0;GPL-3.0-only;GPL-3.0-or-later;AGPL-1.0;AGPL-3.0;AGPL-3.0-only;AGPL-3.0-or-later;SSPL-1.0;BUSL-1.1'

      # Allow-list enforcement. If a new dependency pulls in a license not
      # in this list, the build fails and a human reviews it.
      - name: Allow-list enforcement
        run: |
          npx --yes license-checker-rseidelsohn \
            --production \
            --onlyAllow 'Apache-2.0;MIT;BSD-2-Clause;BSD-3-Clause;ISC;MPL-2.0;Unlicense;CC0-1.0;Apache-2.0 WITH LLVM-exception;0BSD;BlueOak-1.0.0;Python-2.0;CC-BY-3.0;CC-BY-4.0'

      # LGPL family is flagged but not auto-failed; log for human review.
      - name: Flag LGPL for human review (non-blocking)
        continue-on-error: true
        run: |
          OUT=$(npx --yes license-checker-rseidelsohn --production --csv || true)
          if echo "$OUT" | grep -E 'LGPL-[0-9]+\.[0-9]+' > /tmp/lgpl-hits; then
            echo "::warning::LGPL-licensed dependencies detected; please review manually:"
            cat /tmp/lgpl-hits
          fi
