name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Manifest and config files are added in Phase 5. Until then, the
      # action auto-bootstraps on first run using the repo's commit history
      # and opens a seed PR. No harm done if the manifest doesn't yet exist.
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}
