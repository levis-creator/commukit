name: Docker

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc.*"

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: levis-creator/commukit

jobs:
  build-and-push:
    name: Build, push, and verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc.') }}
          labels: |
            org.opencontainers.image.title=commukit
            org.opencontainers.image.description=Reusable multi-tenant communications microservice
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/levis-creator/commukit

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-check NOTICE propagation
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          echo "Pulling $IMAGE for smoke check..."
          docker pull --platform linux/amd64 "$IMAGE"
          echo "--- /app/NOTICE ---"
          docker run --rm --platform linux/amd64 "$IMAGE" cat /app/NOTICE
          docker run --rm --platform linux/amd64 "$IMAGE" test -s /app/NOTICE

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
          format: "sarif"
          output: "trivy-image-results.sarif"

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-image-results.sarif"
          category: "trivy-image"
